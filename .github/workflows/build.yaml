name: Auto Convert Markdown (Python)

on:
  push:
    branches:
      - master

jobs:
  convert_markdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # Use a modern Python version

      - name: Install dependencies
        # Install the Python markdown library and extensions
        run: pip install markdown pymdown-extensions

      - name: Run Markdown Conversion Script
        run: python generate-html.py # 🚨 Execute the Python script

      - name: Commit and Push generated HTML files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate HTML from markdown updates [ci skip]"
          file_pattern: "pages/"